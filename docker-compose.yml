version: "3.9"

services:
  backend:
    build: ./backend
    container_name: sprintwise-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_SECRET_KEY=sprintwise-dev-secret-change-in-production
      - DATABASE_URL=sqlite:////data/sprintwise.db
    volumes:
      - ./backend:/app
      - sprintwise-data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sprintwise-ui
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sprintwise-data:
